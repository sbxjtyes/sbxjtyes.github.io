<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="智答，内容整理中。">
    <title>智答</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span class="logo-icon">✨</span>智答
        </div>
        <div class="header-right">
            <div class="streak-badge">
                <span>内容整理中</span>
            </div>
        </div>
    </header>

    <!-- Category Tabs -->
    <div class="tabs-wrapper">
        <div class="tabs" id="tabs">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">总内容</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="statRead">0</div>
                <div class="stat-label">已查看</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="statCategories">0</div>
                <div class="stat-label">分类数</div>
            </div>
        </div>

        <!-- Card List -->
        <div id="cardList">
            <!-- Rendered by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>当前暂无内容</p>
        <p style="margin-top:4px">如需重新添加内容，可以继续调整数据源。</p>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
